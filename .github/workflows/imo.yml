name: IMO Tests

on:
  push:
    branches: [main]
    paths:
      - "tests/vv/test_imo_*.py"
      - "tests/vv/vv_helpers.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/imo.yml"
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

jobs:
  imo-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: astral-sh/setup-uv@v5

    - name: Sync environment
      run: uv sync --extra dev

    - name: Run IMO tests
      run: uv run --extra dev python -m pytest tests/vv/test_imo_*.py -v --junitxml=results/imo-tests.xml

    - name: Upload results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: imo-test-results
        path: results/imo-tests.xml

    - name: Test summary
      if: always()
      uses: test-summary/action@v2
      with:
        paths: results/imo-tests.xml
